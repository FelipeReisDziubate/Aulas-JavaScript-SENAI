<body>
    <h1> integrando os recursos de interativaidade do JS</h1>
    <hr>
    <script>
        window.alert("DESAFIO 1");
        let num1 = window.prompt("DIGITE O PRIMEIRO NÚMERO");
        let num2 = window.prompt("DIGITE O SEGUNDO NÚMERO");
        let resultado = window.prompt("QUAL OPERAÇÃO DESEJA REALIZAR? DIGITE: + , -");
        let resposta;
        if (resultado == "+") {
            resposta = parseFloat(num1) + parseFloat(num2);
        } else if (resultado == "-") {
            resposta = parseFloat(num1) - parseFloat(num2);
        }
        window.alert("O resultado da operação é: " + resposta);

    </script>
